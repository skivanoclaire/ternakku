# Reverse proxy TernakKu — ternakku.kaltaraprov.web.id
# Hanya Nginx yang terekspos; mem-proxy ke Laravel (app:9000 via FastCGI).

server {
    listen 80;
    server_name ternakku.kaltaraprov.web.id;

    # ACME challenge untuk Certbot (ambil sertifikat Let's Encrypt)
    location /.well-known/acme-challenge/ { root /var/www/certbot; }

    # sisanya paksa ke HTTPS
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl;
    server_name ternakku.kaltaraprov.web.id;

    ssl_certificate     /etc/letsencrypt/live/ternakku.kaltaraprov.web.id/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ternakku.kaltaraprov.web.id/privkey.pem;

    # HSTS (aktif setelah TLS yakin jalan)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    root /var/www/html/public;
    index index.php;

    client_max_body_size 20M;   # untuk unggah foto ternak (Modul 3 nanti)

    location / { try_files $uri $uri/ /index.php?$query_string; }

    location ~ \.php$ {
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /var/www/html/public$fastcgi_script_name;
        fastcgi_param HTTPS on;                       # beri tahu Laravel ini HTTPS
        fastcgi_param HTTP_X_FORWARDED_PROTO https;
    }

    location ~ /\.(?!well-known).* { deny all; }   # tutup file tersembunyi
}
