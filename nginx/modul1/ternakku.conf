# Modul 1 — Nginx reverse proxy ke FastAPI (ml:8000), HTTPS aktif.
server {
    listen 80;
    server_name ternakku.kaltaraprov.web.id;

    location /.well-known/acme-challenge/ { root /var/www/certbot; }   # perpanjangan cert
    location / { return 301 https://$host$request_uri; }              # paksa HTTPS
}

server {
    listen 443 ssl;
    server_name ternakku.kaltaraprov.web.id;

    ssl_certificate     /etc/letsencrypt/live/ternakku.kaltaraprov.web.id/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ternakku.kaltaraprov.web.id/privkey.pem;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    client_max_body_size 20M;

    location / {
        proxy_pass http://ml:8000;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
